services:
  db:
    image: postgres:15-alpine
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: aisafety
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  web:
    build: .
    restart: always
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql://postgres:postgres@db:5432/aisafety
      - SCAN_DEVICE=cpu
      - GROQ_API_KEY=${GROQ_API_KEY:-}
    tmpfs:
      - /tmp
      - /app/reports
    volumes:
      - hf_cache:/app/cache
    depends_on:
      db:
        condition: service_healthy

volumes:
  pgdata:
  hf_cache:
